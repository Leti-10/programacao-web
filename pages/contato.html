<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/x-icon" href="../img/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-pattern">

    <div class="container">
        <header>
            <h1 class="logo">Leticia Lopes</h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="sobre.html" >Sobre</a></li>
                    <li><a href="portfolio.html">Projetos</a></li>

                </ul>
            </nav>
        </header>

        <main class="contato-grid">
            <section class="form-section">
                <h2 class="section-title">Bora Conversar?</h2>
                <form class="contact-form">
                    <div class="field">
                        <label>Nome:</label>
                        <input type="text" name="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="field">
                        <label>E-mail:</label>
                        <input type="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="field">
                        <label>Mensagem:</label>
                        <textarea name="mensagem" rows="5" placeholder="Sua mensagem..."></textarea>
                    </div>
                    <button type="submit" class="btn-send">ENVIAR AGORA! 🥖</button>
                </form>
            </section>

            <section class="links-section">
                <div class="social-hub">
                    <h3 class="hub-title">Minhas Redes</h3>
                    <div class="hub-links">
                        <a href="https://github.com/Leti-10" target="_blank" class="social-link github-brand">GitHub</a>
                        <a href="https://www.instagram.com/leticia_e_lopes" target="_blank" class="social-link insta-brand">Instagram</a>
                        <a href="https://www.linkedin.com/in/leticia-lopes-037737325/" target="_blank" class="social-link linkedin-brand">LinkedIn</a>
                        <a href="mailto:leti.oli.lopes@gmail.com" class="social-link email-brand">E-mail</a>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 - Todos os direitos reservados</p>
        </footer>
    </div>

</body>
